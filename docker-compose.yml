# Runs the MCP server behind Caddy, which terminates TLS and serves it at
# https://domain.com/mcp with an automatically-managed certificate.
#
#   1. Put your service-account key at ./secrets/service-account.json
#   2. Copy .env.example -> .env and fill it in (set MCP_ALLOWED_HOSTS=domain.com)
#   3. Edit Caddyfile: replace domain.com with your real domain
#   4. docker compose up -d --build

services:
  mcp:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      - PORT=3000
      - GOOGLE_APPLICATION_CREDENTIALS=/app/secrets/service-account.json
    volumes:
      - ./secrets:/app/secrets:ro
    expose:
      - "3000"

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - mcp
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
