# Runs the MCP server behind Caddy, which terminates TLS and serves it at
# https://domain.com/mcp with an automatically-managed certificate.
#
#   1. Copy .env.example -> .env and fill it in (set MCP_ALLOWED_HOSTS=domain.com,
#      the GOOGLE_OAUTH_* central-account vars, and the OAuth-server vars).
#   2. Edit Caddyfile: replace domain.com with your real domain
#   3. docker compose up -d --build
#
# (Using a Google service account instead? Re-add the GOOGLE_APPLICATION_CREDENTIALS
#  env var + a `./secrets:/app/secrets:ro` volume, and drop the key file in ./secrets.)

services:
  mcp:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      - PORT=3000
    expose:
      - "3000"

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - mcp
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
